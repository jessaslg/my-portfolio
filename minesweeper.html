<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper</title>
  <style>
    :root {
      color-scheme: light;
      --win-xp-blue: #0054e3;
      --win-xp-title-bar: linear-gradient(180deg, #0058ee 0%, #3a93ff 8%, #0058ee 18%, #0047c7 92%, #003c9e 100%);
      --win-xp-border: #0055e6;
      --win-xp-gray: #ece9d8;
      --win-xp-button: linear-gradient(180deg, #ffffff 0%, #ece9d8 50%, #d4d0c8 100%);
      --win-xp-button-hover: linear-gradient(180deg, #ffffff 0%, #f5f0e6 50%, #e0dcd0 100%);
      --win-xp-cell: #c0c0c0;
      --win-xp-cell-revealed: #c0c0c0;
      --win-xp-cell-border-light: #ffffff;
      --win-xp-cell-border-dark: #808080;
      --win-xp-cell-border-darkest: #404040;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(180deg, #245edb 0%, #3f8cf3 50%, #245edb 100%);
      font-family: Tahoma, "Segoe UI", sans-serif;
      overflow: auto;
      min-height: 100vh;
      box-sizing: border-box;
    }

    body.prank-active {
      overflow: hidden;
    }

    .window {
      background: var(--win-xp-gray);
      border: 3px solid var(--win-xp-border);
      border-radius: 8px 8px 0 0;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      max-width: min(95vw, 500px);
      width: auto;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .title-bar {
      background: var(--win-xp-title-bar);
      padding: 4px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 5px 5px 0 0;
      min-height: 28px;
      margin: -3px -3px 0 -3px;
    }

    .title-bar-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .window-icon {
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      border-radius: 2px;
      border: 1px solid #cc5500;
    }

    .window-title {
      color: white;
      font-size: 13px;
      font-weight: bold;
      text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    .window-controls {
      display: flex;
      gap: 2px;
    }

    .window-btn {
      width: 18px;
      height: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #d4d0c8 100%);
      border: 1px solid #808080;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      cursor: pointer;
      color: #000;
      font-weight: bold;
      min-width: 18px;
      padding: 0;
    }

    .window-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #e8e4d8 100%);
    }

    .menu-bar {
      background: var(--win-xp-gray);
      padding: 2px 4px;
      display: flex;
      gap: 4px;
      border-bottom: 1px solid #808080;
      font-size: 11px;
    }

    .menu-item {
      padding: 2px 8px;
      cursor: pointer;
      color: #000;
    }

    .menu-item:hover {
      background: #316ac5;
      color: white;
    }

    .game-container {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: #c0c0c0;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      padding: 4px 8px;
    }

    .score {
      font-family: 'Digital-7', monospace;
      font-weight: bold;
      font-size: 18px;
      background: #000;
      color: #ff0000;
      padding: 2px 8px;
      min-width: 60px;
      text-align: center;
      border: 2px solid;
      border-color: #808080 #ffffff #ffffff #808080;
    }

    button {
      background: var(--win-xp-button);
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      padding: 4px 12px;
      cursor: pointer;
      font-weight: normal;
      color: #000;
      font-size: 11px;
      font-family: Tahoma, sans-serif;
    }

    button:hover {
      background: var(--win-xp-button-hover);
    }

    button:active {
      border-color: #808080 #ffffff #ffffff #808080;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 0;
      width: 100%;
      margin: 0 auto;
      background: #c0c0c0;
      border: 3px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      user-select: none;
      touch-action: manipulation;
      aspect-ratio: 1 / 1;
      max-width: min(90vw, 400px);
      min-width: 200px;
      overflow: hidden;
    }

    .cell {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #c0c0c0;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      display: grid;
      place-items: center;
      font-weight: bold;
      font-size: clamp(12px, 3vw, 16px);
      cursor: pointer;
      padding: 0;
      touch-action: manipulation;
      font-family: Tahoma, sans-serif;
    }

    .cell:active {
      border-color: #808080 #ffffff #ffffff #808080;
    }

    .cell.revealed {
      background: #c0c0c0;
      border: 1px solid #808080;
      cursor: default;
    }

    .cell.flagged {
      background: #c0c0c0;
    }

    .cell.mine {
      background: #c0c0c0;
    }

    .cell[data-value="1"] { color: #0000ff; }
    .cell[data-value="2"] { color: #008000; }
    .cell[data-value="3"] { color: #ff0000; }
    .cell[data-value="4"] { color: #000080; }
    .cell[data-value="5"] { color: #800000; }
    .cell[data-value="6"] { color: #008080; }
    .cell[data-value="7"] { color: #000000; }
    .cell[data-value="8"] { color: #808080; }

    .prank-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      width: 100vw;
      height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 20%, #ff00c8 0%, transparent 14%),
        radial-gradient(circle at 80% 15%, #00f5ff 0%, transparent 14%),
        radial-gradient(circle at 15% 75%, #ffea00 0%, transparent 16%),
        radial-gradient(circle at 85% 80%, #3bff00 0%, transparent 18%),
        linear-gradient(135deg, #ff0000, #ff7b00, #ffe600, #11ff6a, #00d8ff, #5936ff, #ff00dd);
      background-size: 220% 220%, 220% 220%, 220% 220%, 220% 220%, 300% 300%;
      background-position: 0 0, 50% 0, 0 100%, 100% 100%, 0 0;
      animation: discoShift 0.09s infinite steps(1), discoPulse 0.18s infinite alternate;
      overflow: hidden;
    }

    .prank-overlay.show {
      display: flex;
    }

    .prank-overlay::before,
    .prank-overlay::after {
      content: '';
      position: absolute;
      inset: -20%;
      pointer-events: none;
      opacity: 0.55;
      animation: spinGlow 10s linear infinite;
    }

    .prank-overlay::before {
      background: conic-gradient(from 0deg, #ff00aa, #ffcc00, #00ff88, #00d0ff, #7a5cff, #ff00aa);
      filter: blur(26px);
    }

    .prank-overlay::after {
      background: repeating-linear-gradient(90deg, rgba(255,255,255,0.35), rgba(255,255,255,0.35) 2px, transparent 2px, transparent 8px);
      mix-blend-mode: soft-light;
    }

    .prank-panel {
      position: relative;
      z-index: 2;
      max-width: min(90vw, 900px);
      text-align: center;
      color: white;
      padding: 32px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
      box-shadow: 0 0 30px rgba(255,255,255,0.25), inset 0 0 24px rgba(255,255,255,0.15);
      animation: shake 0.18s infinite alternate;
    }

    .prank-countdown {
      font-size: clamp(42px, 8vw, 92px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 18px;
      text-shadow: 0 0 14px rgba(255,255,255,0.9), 0 0 26px rgba(0, 255, 245, 0.95);
      animation: blinkFlash 0.5s infinite;
    }

    .prank-title {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 64px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.15;
      text-shadow: 0 0 18px rgba(255,255,255,0.95), 0 0 30px rgba(255, 0, 209, 0.85);
      animation: blinkFlash 0.35s infinite;
    }

    .prank-subtitle {
      margin: 0 0 18px;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 800;
      text-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    .prank-close {
      display: none;
      margin: 16px auto 0;
      min-width: 160px;
      padding: 12px 18px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.85);
      background: linear-gradient(180deg, #ffffff, #e8f7ff);
      color: #111827;
      font-size: 16px;
      box-shadow: 0 0 20px rgba(255,255,255,0.32);
    }

    .prank-close.show {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes discoShift {
      0%   { background-position: 0 0, 50% 0, 0 100%, 100% 100%, 0 0; }
      25%  { background-position: 100% 25%, 0 50%, 50% 0, 0 100%, 25% 20%; }
      50%  { background-position: 50% 100%, 100% 0, 100% 100%, 0 0, 75% 40%; }
      75%  { background-position: 0 75%, 50% 100%, 0 0, 100% 25%, 10% 65%; }
      100% { background-position: 100% 0, 0 25%, 50% 100%, 0 50%, 90% 10%; }
    }

    @keyframes discoPulse {
      from { filter: saturate(1.2) brightness(1.05); }
      to   { filter: saturate(1.9) brightness(1.25); }
    }

    @keyframes spinGlow {
      from { transform: rotate(0deg) scale(1); }
      to   { transform: rotate(360deg) scale(1.06); }
    }

    @keyframes shake {
      from { transform: translateX(-4px) rotate(-0.8deg); }
      to   { transform: translateX(4px) rotate(0.8deg); }
    }

    @keyframes blinkFlash {
      0%, 47%, 53%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .window {
        max-width: 95vw;
      }

      .board {
        max-width: min(95vw, 350px);
      }

      .cell {
        font-size: clamp(10px, 4vw, 14px);
      }

      .score {
        font-size: clamp(14px, 4vw, 18px);
        min-width: 50px;
      }

      button {
        font-size: clamp(10px, 3vw, 11px);
        padding: 4px 8px;
      }

      .menu-item {
        padding: 2px 6px;
        font-size: 10px;
      }
    }

    @media (max-width: 400px) {
      .window {
        max-width: 98vw;
      }

      .board {
        max-width: min(98vw, 300px);
      }

      .cell {
        font-size: clamp(9px, 4.5vw, 12px);
      }

      .score {
        font-size: clamp(12px, 4vw, 16px);
        min-width: 45px;
      }

      .window-title {
        font-size: 11px;
      }

      .menu-item {
        padding: 2px 4px;
        font-size: 9px;
      }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="controls">
      <div class="score" id="status">010</div>
      <button id="restartBtn">😊</button>
      <div class="score" id="timer">000</div>
    </div>
    <div class="board" id="board" aria-label="Minesweeper board"></div>
  </div>

  <div id="prank-overlay" class="prank-overlay" aria-hidden="true">
    <div class="prank-panel" role="dialog" aria-modal="true">
      <div class="prank-countdown" id="prank-countdown">10</div>
      <h2 class="prank-title" id="prank-title">⚠ SYSTEM ALERT ⚠</h2>
      <p class="prank-subtitle" id="prank-subtitle">Installing Virus...</p>
      <button type="button" class="prank-close" id="closePrankBtn">Close</button>
    </div>
  </div>

  <audio id="meme-audio" src="/assets/music/Omori%20Caramelldansen%20%20Animation%20Meme.mp3" preload="auto"></audio>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restartBtn');
    const timerEl = document.getElementById('timer');
    const prankOverlay = document.getElementById('prank-overlay');
    const prankCountdown = document.getElementById('prank-countdown');
    const prankTitle = document.getElementById('prank-title');
    const prankSubtitle = document.getElementById('prank-subtitle');
    const closePrankBtn = document.getElementById('closePrankBtn');
    const memeAudio = document.getElementById('meme-audio');

    const rows = 9;
    const cols = 9;
    const mines = 10;
    let board = [];
    let gameOver = false;
    let prankInterval = null;
    let countdownLeft = 10;
    let timerInterval = null;
    let timeElapsed = 0;
    let gameStarted = false;

    function createBoard() {
      board = Array.from({ length: rows }, () => Array.from({ length: cols }, () => ({
        mine: false,
        revealed: false,
        flagged: false,
        count: 0,
      })));

      let placed = 0;
      while (placed < mines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if (!board[r][c].mine) {
          board[r][c].mine = true;
          placed++;
        }
      }

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c].mine) continue;
          board[r][c].count = neighbors(r, c).filter(([rr, cc]) => board[rr][cc].mine).length;
        }
      }
    }

    function neighbors(r, c) {
      const out = [];
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const rr = r + dr;
          const cc = c + dc;
          if (rr >= 0 && rr < rows && cc >= 0 && cc < cols) {
            out.push([rr, cc]);
          }
        }
      }
      return out;
    }

    function triggerPrankOverlay() {
      countdownLeft = 10;
      prankCountdown.textContent = String(countdownLeft);
      prankTitle.textContent = '⚠ SYSTEM ALERT ⚠';
      prankSubtitle.textContent = 'Installing Virus...';
      closePrankBtn.classList.remove('show');
      prankOverlay.classList.add('show');
      prankOverlay.setAttribute('aria-hidden', 'false');
      document.body.classList.add('prank-active');
      window.parent.postMessage({ type: 'minesweeper-prank-state', locked: true }, '*');

      if (memeAudio) {
        memeAudio.currentTime = 0;
        memeAudio.volume = 1;
        memeAudio.play().catch(() => {});
      }

      clearInterval(prankInterval);
      prankInterval = setInterval(() => {
        countdownLeft -= 1;
        if (countdownLeft <= 0) {
          clearInterval(prankInterval);
          prankCountdown.textContent = '00';
          prankTitle.textContent = '🤣 JUST KIDDING YOU GOT PRANKED 🤣';
          prankSubtitle.textContent = 'The virus install was a prank. You are safe now.';
          closePrankBtn.classList.add('show');
          window.parent.postMessage({ type: 'minesweeper-prank-state', locked: false }, '*');
          return;
        }
        prankCountdown.textContent = String(countdownLeft);
      }, 1000);
    }

    function closePrankOverlay() {
      clearInterval(prankInterval);
      prankOverlay.classList.remove('show');
      prankOverlay.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('prank-active');
      closePrankBtn.classList.remove('show');
      window.parent.postMessage({ type: 'minesweeper-prank-state', locked: false }, '*');

      if (memeAudio) {
        memeAudio.pause();
        try { memeAudio.currentTime = 0; } catch (e) {}
      }

      restartGame();
    }

    function startTimer() {
      if (gameStarted || gameOver) return;
      gameStarted = true;
      timeElapsed = 0;
      timerEl.textContent = '000';
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeElapsed++;
        if (timeElapsed > 999) {
          timeElapsed = 999;
          clearInterval(timerInterval);
        }
        timerEl.textContent = String(timeElapsed).padStart(3, '0');
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    function updateMineCount() {
      const flaggedCount = board.flat().filter(cell => cell.flagged).length;
      const remaining = mines - flaggedCount;
      statusEl.textContent = String(Math.max(0, remaining)).padStart(3, '0');
    }

    function revealCell(r, c) {
      if (gameOver) return;
      const cell = board[r][c];
      if (cell.revealed || cell.flagged) return;

      if (!gameStarted) {
        startTimer();
      }

      cell.revealed = true;

      if (cell.mine) {
        cell.revealed = true;
        gameOver = true;
        stopTimer();
        restartBtn.textContent = '😵';
        revealAllMines();
        render();
        triggerPrankOverlay();
        return;
      }

      if (cell.count === 0) {
        neighbors(r, c).forEach(([rr, cc]) => {
          if (!board[rr][cc].revealed && !board[rr][cc].flagged) {
            revealCell(rr, cc);
          }
        });
      }

      checkWin();
      render();
    }

    function toggleFlag(r, c) {
      if (gameOver) return;
      const cell = board[r][c];
      if (cell.revealed) return;
      cell.flagged = !cell.flagged;
      updateMineCount();
      render();
    }

    function revealAllMines() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c].mine) {
            board[r][c].revealed = true;
          }
        }
      }
    }

    function checkWin() {
      const safeCells = rows * cols - mines;
      const revealedSafe = board.flat().filter(cell => !cell.mine && cell.revealed).length;
      if (revealedSafe === safeCells) {
        gameOver = true;
        stopTimer();
        restartBtn.textContent = '😎';
        statusEl.textContent = '000';
      }
    }

    function render() {
      boardEl.innerHTML = '';

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = board[r][c];
          const btn = document.createElement('button');
          btn.className = 'cell';
          btn.dataset.row = r;
          btn.dataset.col = c;

          if (cell.revealed) {
            btn.classList.add('revealed');
            if (cell.mine) {
              btn.classList.add('mine');
              btn.textContent = '💣';
            } else if (cell.count > 0) {
              btn.dataset.value = String(cell.count);
              btn.textContent = cell.count;
            }
          } else if (cell.flagged) {
            btn.classList.add('flagged');
            btn.textContent = '🚩';
          }

          btn.addEventListener('click', () => revealCell(r, c));
          btn.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            toggleFlag(r, c);
          });

          boardEl.appendChild(btn);
        }
      }
    }

    function restartGame() {
      createBoard();
      gameOver = false;
      gameStarted = false;
      timeElapsed = 0;
      stopTimer();
      timerEl.textContent = '000';
      statusEl.textContent = '010';
      restartBtn.textContent = '😊';
      render();
    }

    restartBtn.addEventListener('click', restartGame);
    closePrankBtn.addEventListener('click', closePrankOverlay);
    restartGame();
  </script>
</body>
</html>
