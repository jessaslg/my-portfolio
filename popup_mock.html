<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Popup Mock</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    /* Overall window look */
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#c0c0c0; }
    .window { width:100%; height:100vh; box-sizing:border-box; display:flex; flex-direction:column; }

    /* Blue titlebar (Windows XP style) */
    .titlebar { background:linear-gradient(#2a66c9,#1d4fb2); color:white; padding:6px 10px; display:flex; align-items:center; }
    .titlebar .icon { width:18px; height:18px; background:#fff; border-radius:3px; margin-right:8px; }
    .titlebar .title { font-weight:bold; font-size:14px; flex:1 }
    .titlebar .controls { display:flex; gap:6px }
    .ctrl { width:18px; height:18px; border-radius:3px; background:#e7f0ff; display:inline-block }

    /* Toolbar area under title */
    .toolbar { background:#f2f6fb; padding:10px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #ddd }
    .tab { background:#fff; padding:6px 8px; border:1px solid #ccc; border-radius:3px; }
    .nav { display:flex; gap:8px; align-items:center }
    .nav button { padding:6px 8px; border:1px solid #bbb; background:#fff; border-radius:50%; }
    .address { flex:1; border:1px solid #bbb; height:26px; border-radius:3px; padding:3px 8px; background:white }

    /* Large content area */
    .content { flex:1; background:white; display:flex; align-items:flex-start; justify-content:center; padding:30px }
    .card { width:600px; height:760px; background:#fff; border:1px solid #d7d7d7; box-shadow:0 0 0 6px rgba(0,0,0,0.04) }

    /* small responsive */
    @media (max-width:700px){ .card{ width:90%; height:70vh } }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="icon"></div>
      <div class="title">Mozilla Firefox</div>
      <div class="controls">
        <div class="ctrl"></div>
        <div class="ctrl"></div>
        <div class="ctrl"></div>
      </div>
    </div>
    <div class="toolbar">
      <div class="tab">Jessa Portfolio</div>
      <div class="nav">
        <button>&larr;</button>
        <button>&rarr;</button>
      </div>
      <input class="address" value="about:home">
      <div style="width:40px"></div>
    </div>
    <div class="content">
      <div class="card"></div>
    </div>
  </div>
</body>
</html>
